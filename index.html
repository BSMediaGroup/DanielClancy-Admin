<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="Static admin dashboard foundation for the DanielClancy.net professional portfolio ecosystem."
    />
    <meta name="theme-color" content="#050607" />
    <title>DanielClancy.net Admin</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./assets/css/admin.css" />
  </head>
  <body class="auth-pending">
    <div class="admin-auth-gate" id="admin-auth-gate" role="dialog" aria-modal="true"></div>
    <div class="admin-shell" id="admin-shell">
      <aside class="sidebar" aria-label="Admin navigation">
        <a class="brand" href="#/overview" aria-label="DanielClancy.net Admin overview">
          <img src="./assets/logos/logomattesilver.webp" alt="" />
          <span>
            <strong>DanielClancy.net</strong>
            <small>ADMIN DASHBOARD</small>
          </span>
        </a>

        <nav class="sidebar-nav" id="sidebar-nav"></nav>

        <div class="sidebar-note">
          <span class="status-dot status-dot-warn" aria-hidden="true"></span>
          Static foundation. No live admin API connected.
        </div>
      </aside>

      <div class="workspace">
        <header class="topbar">
          <div class="topbar-loader" id="topbar-loader" aria-hidden="true">
            <span class="topbar-loader-track"><span class="topbar-loader-bar"></span></span>
          </div>
          <button class="icon-button" id="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="true">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <button class="sidebar-mode-button" id="sidebar-collapse-toggle" type="button" aria-label="Collapse sidebar" title="Collapse sidebar">
            <span class="ui-mask-icon" style="--icon-url: url('./assets/icons/ui/sidebarclose.svg')" aria-hidden="true"></span>
          </button>
          <button class="sidebar-mode-button" id="sidebar-hide-toggle" type="button" aria-label="Hide sidebar" title="Hide sidebar">
            <span class="ui-mask-icon" style="--icon-url: url('./assets/icons/ui/hidden.svg')" aria-hidden="true"></span>
          </button>
          <div class="topbar-title">
            <span class="eyebrow">Professional Portfolio Administration</span>
            <strong id="route-title">Overview</strong>
          </div>
          <div class="topbar-actions">
            <span class="environment-pill">Scaffold data</span>
            <span id="auth-status" class="auth-status-pill"></span>
            <span id="topbar-user" class="topbar-user"></span>
          </div>
        </header>

        <main class="content" id="app" tabindex="-1"></main>

        <footer class="footer">
          <div class="footer-left">
            <span>DanielClancy.net Admin</span>
            <span class="footer-sep">/</span>
            <span>v0.1.2-beta -> v1.0</span>
          </div>
          <div class="footer-right">
            <span>Admin CMS uses KV when configured and local fallback when unavailable.</span>
          </div>
        </footer>
      </div>
      <button class="sidebar-reopen-button" id="sidebar-reopen-toggle" type="button" aria-label="Show sidebar" title="Show sidebar">
        <span class="ui-mask-icon" style="--icon-url: url('./assets/icons/ui/sidebaropen.svg')" aria-hidden="true"></span>
      </button>
    </div>

    <script src="./assets/js/scaffold-data.js"></script>
    <script src="./assets/js/turnstile.js"></script>
    <script src="./assets/js/admin-auth.js"></script>
    <script src="./assets/js/admin-app.js"></script>
  </body>
</html>
